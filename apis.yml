aid: excel-macros
name: Excel Macros
description: >-
  Excel Macros refer to automated sequences of actions in Microsoft Excel,
  primarily written using VBA (Visual Basic for Applications). Excel also
  supports Office Scripts (TypeScript) for cloud-based automation and the
  Excel JavaScript API for building Office Add-ins that run on the web,
  Windows, Mac, and iPad. These automation capabilities allow users to
  streamline repetitive tasks, manipulate workbooks, and extend Excel
  functionality.
